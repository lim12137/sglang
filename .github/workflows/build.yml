name: Build SGLang Images (latest upstream, time tags)

on:
  workflow_dispatch:
    inputs:
      time_tag:
        description: "可选：覆盖时间 tag（默认 UTC YYYYMMDD-HHMMSS）"
        required: false
        default: ""
      sglang_base:
        description: "SGLang 基础上游镜像"
        required: false
        default: "lmsysorg/sglang:main-cann8.5.0-910b"
      omni_base:
        description: "ASR 专用上游（SGLang-Omni，对齐 MOSS cookbook）"
        required: false
        default: "lmsysorg/sglang-omni:latest"
      base_platform:
        description: "基础镜像平台"
        required: false
        default: "linux/arm64"
      asr_platform:
        description: "ASR 镜像平台（官方 cookbook 为 NVIDIA/CUDA，默认 amd64）"
        required: false
        default: "linux/amd64"
      build_base:
        description: "构建 SGLang 基础镜像"
        type: boolean
        required: false
        default: true
      build_asr:
        description: "构建 ASR 专用镜像（-asr / MOSS-Transcribe-Diarize）"
        type: boolean
        required: false
        default: true
  push:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "Dockerfile.asr"
      - "requirements-asr.txt"
      - "scripts/serve-moss-transcribe-diarize.sh"
      - ".github/workflows/build.yml"

env:
  DEFAULT_SGLANG_BASE: lmsysorg/sglang:main-cann8.5.0-910b
  DEFAULT_OMNI_BASE: lmsysorg/sglang-omni:latest
  DEFAULT_BASE_PLATFORM: linux/arm64
  DEFAULT_ASR_PLATFORM: linux/amd64
  ACR_REGISTRY: crpi-fs24haezdztsodhc.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: hopemyl
  IMAGE_NAME: sglang-cann

jobs:
  resolve-tags:
    runs-on: ubuntu-22.04
    outputs:
      time_tag: ${{ steps.tags.outputs.time_tag }}
      base_tag: ${{ steps.tags.outputs.base_tag }}
      asr_tag: ${{ steps.tags.outputs.asr_tag }}
      sglang_base: ${{ steps.tags.outputs.sglang_base }}
      omni_base: ${{ steps.tags.outputs.omni_base }}
      base_platform: ${{ steps.tags.outputs.base_platform }}
      asr_platform: ${{ steps.tags.outputs.asr_platform }}
      has_acr: ${{ steps.tags.outputs.has_acr }}
    steps:
      - name: Resolve time tag and upstream
        id: tags
        env:
          ACR_PWD: ${{ secrets.ALIYUN_ACR_PWD }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.time_tag }}" ]; then
            TIME_TAG="${{ github.event.inputs.time_tag }}"
          else
            TIME_TAG="$(date -u +%Y%m%d-%H%M%S)"
          fi
          TIME_TAG="$(echo "$TIME_TAG" | tr -cd 'A-Za-z0-9._-')"
          if [ -z "$TIME_TAG" ]; then
            TIME_TAG="$(date -u +%Y%m%d-%H%M%S)"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.sglang_base }}" ]; then
            SGLANG_BASE="${{ github.event.inputs.sglang_base }}"
          else
            SGLANG_BASE="${{ env.DEFAULT_SGLANG_BASE }}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.omni_base }}" ]; then
            OMNI_BASE="${{ github.event.inputs.omni_base }}"
          else
            OMNI_BASE="${{ env.DEFAULT_OMNI_BASE }}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.base_platform }}" ]; then
            BASE_PLATFORM="${{ github.event.inputs.base_platform }}"
          else
            BASE_PLATFORM="${{ env.DEFAULT_BASE_PLATFORM }}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.asr_platform }}" ]; then
            ASR_PLATFORM="${{ github.event.inputs.asr_platform }}"
          else
            ASR_PLATFORM="${{ env.DEFAULT_ASR_PLATFORM }}"
          fi

          BASE_TAG="$TIME_TAG"
          ASR_TAG="${TIME_TAG}-asr"

          if [ -n "$ACR_PWD" ]; then
            HAS_ACR=true
          else
            HAS_ACR=false
            echo "::warning::ALIYUN_ACR_PWD empty; push GHCR only"
          fi

          {
            echo "time_tag=$TIME_TAG"
            echo "base_tag=$BASE_TAG"
            echo "asr_tag=$ASR_TAG"
            echo "sglang_base=$SGLANG_BASE"
            echo "omni_base=$OMNI_BASE"
            echo "base_platform=$BASE_PLATFORM"
            echo "asr_platform=$ASR_PLATFORM"
            echo "has_acr=$HAS_ACR"
          } >> "$GITHUB_OUTPUT"

          echo "TIME_TAG=$TIME_TAG BASE_TAG=$BASE_TAG ASR_TAG=$ASR_TAG"
          echo "SGLANG_BASE=$SGLANG_BASE OMNI_BASE=$OMNI_BASE"
          echo "BASE_PLATFORM=$BASE_PLATFORM ASR_PLATFORM=$ASR_PLATFORM HAS_ACR=$HAS_ACR"

  build-base:
    needs: resolve-tags
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_base }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift || true
          sudo docker system prune --all --force || true
          df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - uses: docker/setup-buildx-action@v3

      - name: Verify upstream base
        run: |
          docker buildx imagetools inspect "${{ needs.resolve-tags.outputs.sglang_base }}" --format '{{json .Manifest}}' > /tmp/manifest.json
          python3 - <<'PY'
          import json, os
          want = os.environ["PLATFORM"]
          os_name, arch = want.split("/", 1)
          with open("/tmp/manifest.json", encoding="utf-8") as f:
              m = json.load(f)
          platforms = [i.get("platform", {}) for i in m.get("manifests", [])]
          if m.get("manifests"):
              ok = any(p.get("os") == os_name and p.get("architecture") == arch for p in platforms)
              if not ok:
                  print("WARN: multi-arch manifest missing", want, "digest", m.get("digest"))
          print("BASE_UPSTREAM_OK", m.get("digest", "single-manifest"))
          PY
        env:
          PLATFORM: ${{ needs.resolve-tags.outputs.base_platform }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: ${{ needs.resolve-tags.outputs.has_acr == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: hopemyl
          password: ${{ secrets.ALIYUN_ACR_PWD }}

      - name: Compose tags (base)
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ needs.resolve-tags.outputs.base_tag }}"
          {
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:${TAG}"
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:latest"
          } > /tmp/tags.txt
          if [ "${{ needs.resolve-tags.outputs.has_acr }}" = "true" ]; then
            {
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${TAG}"
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
            } >> /tmp/tags.txt
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ needs.resolve-tags.outputs.base_platform }}
          build-args: |
            SGLANG_BASE=${{ needs.resolve-tags.outputs.sglang_base }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.created=${{ needs.resolve-tags.outputs.time_tag }}
            sglang.image.role=base
            sglang.upstream=${{ needs.resolve-tags.outputs.sglang_base }}
          cache-from: type=gha,scope=sglang-base
          cache-to: type=gha,mode=min,scope=sglang-base

  build-asr:
    needs: resolve-tags
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_asr }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift || true
          sudo docker system prune --all --force || true
          df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - uses: docker/setup-buildx-action@v3

      - name: Verify Omni upstream
        run: |
          docker buildx imagetools inspect "${{ needs.resolve-tags.outputs.omni_base }}" --format '{{json .Manifest}}' > /tmp/omni.json
          python3 - <<'PY'
          import json
          with open("/tmp/omni.json", encoding="utf-8") as f:
              m = json.load(f)
          print("OMNI_UPSTREAM_OK", m.get("digest", "single-manifest"), "keys", list(m.keys())[:8])
          PY

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: ${{ needs.resolve-tags.outputs.has_acr == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: hopemyl
          password: ${{ secrets.ALIYUN_ACR_PWD }}

      - name: Compose tags (asr)
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ needs.resolve-tags.outputs.asr_tag }}"
          {
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:${TAG}"
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:latest-asr"
          } > /tmp/tags.txt
          if [ "${{ needs.resolve-tags.outputs.has_acr }}" = "true" ]; then
            {
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${TAG}"
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest-asr"
            } >> /tmp/tags.txt
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt

      - name: Build and push ASR (MOSS-Transcribe-Diarize)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.asr
          platforms: ${{ needs.resolve-tags.outputs.asr_platform }}
          build-args: |
            SGLANG_OMNI_BASE=${{ needs.resolve-tags.outputs.omni_base }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.created=${{ needs.resolve-tags.outputs.time_tag }}
            sglang.image.role=asr
            sglang.omni.upstream=${{ needs.resolve-tags.outputs.omni_base }}
            sglang.model.default=OpenMOSS-Team/MOSS-Transcribe-Diarize
          cache-from: type=gha,scope=sglang-omni-asr
          cache-to: type=gha,mode=min,scope=sglang-omni-asr
