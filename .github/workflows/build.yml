name: Build SGLang CANN 8.5 Images

on:
  workflow_dispatch:
    inputs:
      time_tag:
        description: "Override time tag (UTC YYYYMMDD-HHMMSS). Empty = auto"
        required: false
        default: ""
      cann_line:
        description: "CANN line prefix match"
        required: false
        default: "cann8.5"
      device:
        description: "Device suffix: 910b or a3"
        required: false
        default: "910b"
      sglang_base:
        description: "Manual upstream image (empty = auto latest dynamic CANN 8.5)"
        required: false
        default: ""
      build_base:
        description: "Build base image"
        type: boolean
        required: false
        default: true
      build_asr:
        description: "Build ASR image (-asr tag)"
        type: boolean
        required: false
        default: true
  push:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "Dockerfile.asr"
      - "requirements-asr.txt"
      - "scripts/serve-moss-transcribe-diarize.sh"
      - ".github/workflows/build.yml"

env:
  FALLBACK_SGLANG_BASE: lmsysorg/sglang:main-cann8.5.0-910b
  ACR_REGISTRY: crpi-fs24haezdztsodhc.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: hopemyl
  IMAGE_NAME: sglang

jobs:
  resolve-tags:
    runs-on: ubuntu-22.04
    outputs:
      time_tag: ${{ steps.tags.outputs.time_tag }}
      base_tag: ${{ steps.tags.outputs.base_tag }}
      asr_tag: ${{ steps.tags.outputs.asr_tag }}
      sglang_base: ${{ steps.tags.outputs.sglang_base }}
      base_platform: ${{ steps.tags.outputs.base_platform }}
      has_acr: ${{ steps.tags.outputs.has_acr }}
      upstream_digest: ${{ steps.tags.outputs.upstream_digest }}
    steps:
      - name: Resolve latest CANN 8.5 dynamic upstream + time tag
        id: tags
        env:
          ACR_PWD: ${{ secrets.ALIYUN_ACR_PWD }}
          INPUT_TIME_TAG: ${{ github.event.inputs.time_tag }}
          INPUT_CANN_LINE: ${{ github.event.inputs.cann_line }}
          INPUT_DEVICE: ${{ github.event.inputs.device }}
          INPUT_SGLANG_BASE: ${{ github.event.inputs.sglang_base }}
          EVENT_NAME: ${{ github.event_name }}
          FALLBACK: ${{ env.FALLBACK_SGLANG_BASE }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${INPUT_TIME_TAG:-}" ]; then
            TIME_TAG="$INPUT_TIME_TAG"
          else
            TIME_TAG="$(date -u +%Y%m%d-%H%M%S)"
          fi
          TIME_TAG="$(echo "$TIME_TAG" | tr -cd 'A-Za-z0-9._-')"
          [ -n "$TIME_TAG" ] || TIME_TAG="$(date -u +%Y%m%d-%H%M%S)"

          CANN_LINE="${INPUT_CANN_LINE:-cann8.5}"
          DEVICE="${INPUT_DEVICE:-910b}"
          [ -n "$CANN_LINE" ] || CANN_LINE="cann8.5"
          [ -n "$DEVICE" ] || DEVICE="910b"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${INPUT_SGLANG_BASE:-}" ]; then
            SGLANG_BASE="$INPUT_SGLANG_BASE"
          else
            TOKEN="$(curl -fsSL "https://auth.docker.io/token?service=registry.docker.io&scope=repository:lmsysorg/sglang:pull" | python3 -c 'import sys,json; print(json.load(sys.stdin)["token"])')"
            curl -fsSL -H "Authorization: Bearer ${TOKEN}" https://registry-1.docker.io/v2/lmsysorg/sglang/tags/list -o /tmp/tags.json
            SGLANG_BASE="$(CANN_LINE="$CANN_LINE" DEVICE="$DEVICE" FALLBACK="$FALLBACK" python3 - <<'PY'
import json, os, re
cann = os.environ["CANN_LINE"]
device = os.environ["DEVICE"]
fallback = os.environ.get("FALLBACK", "lmsysorg/sglang:main-cann8.5.0-910b")
with open("/tmp/tags.json", encoding="utf-8") as f:
    tags = json.load(f).get("tags") or []
main_pat = re.compile(rf"^main-{re.escape(cann)}[0-9.]*-{re.escape(device)}$")
mains = sorted(t for t in tags if main_pat.match(t))
if mains:
    print(f"lmsysorg/sglang:{mains[-1]}")
    raise SystemExit(0)
ver_pat = re.compile(rf"^v(.+?)-{re.escape(cann)}[0-9.]*-{re.escape(device)}$")
cands = [t for t in tags if ver_pat.match(t)]
if not cands:
    print(fallback)
    raise SystemExit(0)

def score(tag: str):
    body = tag[1:].split("-", 1)[0]
    nums = []
    for part in re.split(r"[^0-9]+", body):
        if part.isdigit():
            nums.append(int(part))
    return nums

best = sorted(cands, key=score)[-1]
print(f"lmsysorg/sglang:{best}")
PY
)"
          fi

          DIGEST="$(docker buildx imagetools inspect "$SGLANG_BASE" --format '{{json .Manifest}}' 2>/dev/null | python3 -c 'import sys,json; print(json.load(sys.stdin).get("digest",""))' || true)"
          [ -n "$DIGEST" ] || DIGEST="unknown"

          if [ -n "${ACR_PWD:-}" ]; then HAS_ACR=true; else HAS_ACR=false; echo "::warning::ALIYUN_ACR_PWD empty; GHCR only"; fi

          {
            echo "time_tag=$TIME_TAG"
            echo "base_tag=$TIME_TAG"
            echo "asr_tag=${TIME_TAG}-asr"
            echo "sglang_base=$SGLANG_BASE"
            echo "base_platform=linux/arm64"
            echo "has_acr=$HAS_ACR"
            echo "upstream_digest=$DIGEST"
          } >> "$GITHUB_OUTPUT"

          echo "TIME_TAG=$TIME_TAG"
          echo "SGLANG_BASE=$SGLANG_BASE"
          echo "DIGEST=$DIGEST"
          echo "HAS_ACR=$HAS_ACR"

  build-base:
    needs: resolve-tags
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_base }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift || true
          sudo docker system prune --all --force || true
          df -h /

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - uses: docker/setup-buildx-action@v3

      - name: Verify upstream
        run: |
          echo "upstream=${{ needs.resolve-tags.outputs.sglang_base }}"
          echo "digest=${{ needs.resolve-tags.outputs.upstream_digest }}"
          docker buildx imagetools inspect "${{ needs.resolve-tags.outputs.sglang_base }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: ${{ needs.resolve-tags.outputs.has_acr == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: hopemyl
          password: ${{ secrets.ALIYUN_ACR_PWD }}

      - name: Compose tags
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ needs.resolve-tags.outputs.base_tag }}"
          {
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:${TAG}"
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:latest"
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:cann8.5-latest"
          } > /tmp/tags.txt
          if [ "${{ needs.resolve-tags.outputs.has_acr }}" = "true" ]; then
            {
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${TAG}"
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:cann8.5-latest"
            } >> /tmp/tags.txt
          fi
          {
            echo "tags<<EOF"
            cat /tmp/tags.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt

      - name: Build and push base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ needs.resolve-tags.outputs.base_platform }}
          build-args: |
            SGLANG_BASE=${{ needs.resolve-tags.outputs.sglang_base }}
            UPSTREAM_REF=${{ needs.resolve-tags.outputs.sglang_base }}
            BUILD_TIME_TAG=${{ needs.resolve-tags.outputs.time_tag }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.created=${{ needs.resolve-tags.outputs.time_tag }}
            sglang.image.role=base
            sglang.cann.line=8.5
            sglang.upstream.ref=${{ needs.resolve-tags.outputs.sglang_base }}
            sglang.upstream.digest=${{ needs.resolve-tags.outputs.upstream_digest }}
          cache-from: type=gha,scope=sglang-cann85-base
          cache-to: type=gha,mode=min,scope=sglang-cann85-base

  build-asr:
    needs: resolve-tags
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_asr }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift || true
          sudo docker system prune --all --force || true
          df -h /

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        if: ${{ needs.resolve-tags.outputs.has_acr == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: hopemyl
          password: ${{ secrets.ALIYUN_ACR_PWD }}

      - name: Compose tags
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ needs.resolve-tags.outputs.asr_tag }}"
          {
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:${TAG}"
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:latest-asr"
            echo "ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:cann8.5-latest-asr"
          } > /tmp/tags.txt
          if [ "${{ needs.resolve-tags.outputs.has_acr }}" = "true" ]; then
            {
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${TAG}"
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest-asr"
              echo "${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:cann8.5-latest-asr"
            } >> /tmp/tags.txt
          fi
          {
            echo "tags<<EOF"
            cat /tmp/tags.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt

      - name: Build and push ASR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.asr
          platforms: ${{ needs.resolve-tags.outputs.base_platform }}
          build-args: |
            SGLANG_BASE=${{ needs.resolve-tags.outputs.sglang_base }}
            UPSTREAM_REF=${{ needs.resolve-tags.outputs.sglang_base }}
            BUILD_TIME_TAG=${{ needs.resolve-tags.outputs.time_tag }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.created=${{ needs.resolve-tags.outputs.time_tag }}
            sglang.image.role=asr
            sglang.cann.line=8.5
            sglang.upstream.ref=${{ needs.resolve-tags.outputs.sglang_base }}
            sglang.upstream.digest=${{ needs.resolve-tags.outputs.upstream_digest }}
          cache-from: type=gha,scope=sglang-cann85-asr
          cache-to: type=gha,mode=min,scope=sglang-cann85-asr
